name: dbt CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-dbt:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # 3️⃣ Install DBT and Snowflake adapter
      - name: Install DBT and adapter
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-snowflake

      # 4️⃣ Install dbt dependencies
      - name: Install dbt dependencies
        run: dbt deps

      # 5️⃣ Create dbt profiles.yml from GitHub secrets
      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "default:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: \"${{ secrets.SNOWFLAKE_ACCOUNT }}\"
      user: \"${{ secrets.SNOWFLAKE_USER }}\"
      password: \"${{ secrets.SNOWFLAKE_PASSWORD }}\"
      role: ACCOUNTADMIN
      database: \"${{ secrets.SNOWFLAKE_DATABASE }}\"
      warehouse: \"${{ secrets.SNOWFLAKE_WAREHOUSE }}\"
      schema: RAW
      threads: 6" > ~/.dbt/profiles.yml

      # 6️⃣ Optional: Debug the connection
      - name: dbt debug
        run: dbt debug --profiles-dir ~/.dbt

      # 7️⃣ Deploy your dbt project
      - name: Deploy dbt project
        run: dbt build --profiles-dir ~/.dbt
